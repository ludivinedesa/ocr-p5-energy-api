name: CI/CD - Energy Prediction API

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    name: Lint and test API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Prepare logs directory
        run: mkdir -p logs

      - name: Run Flake8 linting
        run: |
          set -o pipefail
          flake8 app tests --count --show-source --statistics 2>&1 | tee logs/flake8.log

      - name: Run Pytest with coverage
        run: |
          set -o pipefail
          pytest tests -v --cov=app --cov-report=term-missing --cov-report=xml:logs/coverage.xml 2>&1 | tee logs/pytest.log

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: logs/

  deploy:
    name: Deploy to Hugging Face Space
    runs-on: ubuntu-latest
    needs: ci

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Hugging Face CLI
        run: |
          python -m pip install --upgrade pip
          pip install -U huggingface_hub

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf upload ldesa/ocr-p5-energy-api . . \
            --repo-type=space \
            --token "$HF_TOKEN" \
            --include "Dockerfile" \
            --include ".dockerignore" \
            --include "requirements.txt" \
            --include "README.md" \
            --include ".env.example" \
            --include "app/**" \
            --exclude "__pycache__/**" \
            --exclude ".DS_Store" \
            --exclude ".git/**" \
            --exclude ".github/**" \
            --exclude ".venv/**" \
            --exclude "venv/**" \
            --exclude "tests/**" \
            --exclude "logs/**" \
            --commit-message "Deploy API from GitHub Actions"
