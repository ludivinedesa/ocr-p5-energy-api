name: CI/CD - Energy Prediction API

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    name: Lint and test API
    runs-on: ubuntu-latest

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ocr_p5_energy_test
      POSTGRES_TEST_DB: ocr_p5_energy_test
      POSTGRES_USER: ocr_p5_user
      POSTGRES_PASSWORD: ocr_p5_password
      DATABASE_LOGGING_ENABLED: "false"
      RUN_DB_INTEGRATION_TESTS: "true"
      API_KEY: test-api-key

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ocr_p5_energy_test
          POSTGRES_USER: ocr_p5_user
          POSTGRES_PASSWORD: ocr_p5_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ocr_p5_user -d ocr_p5_energy_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Prepare logs directory
        run: mkdir -p logs

      - name: Initialize PostgreSQL test database
        env:
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}
        run: |
          psql \
            -v ON_ERROR_STOP=1 \
            -h "$POSTGRES_HOST" \
            -p "$POSTGRES_PORT" \
            -U "$POSTGRES_USER" \
            -d "$POSTGRES_DB" \
            -f scripts/create_tables.sql

          psql \
            -v ON_ERROR_STOP=1 \
            -h "$POSTGRES_HOST" \
            -p "$POSTGRES_PORT" \
            -U "$POSTGRES_USER" \
            -d "$POSTGRES_DB" \
            -f scripts/seed_model_versions.sql

      - name: Run Flake8 linting
        run: |
          set -o pipefail
          flake8 app scripts tests \
            --count \
            --show-source \
            --statistics \
            2>&1 | tee logs/flake8.log

      - name: Run Pytest with coverage
        run: |
          set -o pipefail
          pytest tests -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:logs/coverage.xml \
            --cov-report=html:htmlcov \
            2>&1 | tee logs/pytest.log

      - name: Upload CI reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports
          path: |
            logs/
            htmlcov/

  deploy:
    name: Deploy to Hugging Face Space
    runs-on: ubuntu-latest
    needs: ci

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Hugging Face CLI
        run: |
          python -m pip install --upgrade pip
          pip install -U huggingface_hub

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf upload ldesa/ocr-p5-energy-api . . \
            --repo-type=space \
            --token "$HF_TOKEN" \
            --include "Dockerfile" \
            --include ".dockerignore" \
            --include "requirements.txt" \
            --include "README.md" \
            --include ".env.example" \
            --include "app/**" \
            --exclude "__pycache__/**" \
            --exclude ".DS_Store" \
            --exclude ".git/**" \
            --exclude ".github/**" \
            --exclude ".venv/**" \
            --exclude "venv/**" \
            --exclude "tests/**" \
            --exclude "logs/**" \
            --commit-message "Deploy API from GitHub Actions"
