services:
  api:
    build: .
    container_name: ocr_p5_api
    ports:
      - "8000:7860"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - ./docs:/app/docs
      - ./scripts:/app/scripts

  db:
    image: postgres:16
    container_name: ocr_p5_postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ocr_p5_user} -d ${POSTGRES_DB:-ocr_p5_energy}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
