services:
  api:
    build: .
    container_name: ocr_p5_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - ./docs:/app/docs
      - ./scripts:/app/scripts

  db:
    image: postgres:16
    container_name: ocr_p5_postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: